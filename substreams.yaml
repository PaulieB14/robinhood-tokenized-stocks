specVersion: v0.1.0
package:
  name: robinhood_tokenized_stocks
  version: v0.2.0
  url: https://github.com/PaulieB14/robinhood-tokenized-stocks
  image: ./robinhood.png
  description: >-
    Robinhood Chain (eip155:4663) tokenized stocks — raw data layer. Three maps:
    map_scaled_transfers (ERC-8056 TransferWithScaledUI, correct ui_value — naive
    Transfer overstates supply ~56%), map_oracle_updates (Chainlink AnswerUpdated
    push feeds, the on-chain fair price per stock), and map_v4_swaps (Uniswap V4
    Swap events). All match by topic0 (no address lists). Stream against Pinax:
    -e robinhood.substreams.pinax.network:443

protobuf:
  files:
    - robinhood.proto
  importPaths:
    - ./proto

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/robinhood_substreams.wasm

network: robinhood-chain

modules:
  - name: map_scaled_transfers
    kind: map
    initialBlock: 0
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:robinhood.v1.ScaledTransfers

  - name: map_oracle_updates
    kind: map
    initialBlock: 0
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:robinhood.v1.OracleUpdates

  - name: map_v4_swaps
    kind: map
    initialBlock: 0
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:robinhood.v1.Swaps
