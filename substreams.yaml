specVersion: v0.1.0
package:
  name: robinhood_tokenized_stocks
  version: v0.1.0
  url: https://github.com/PaulieB14/robinhood-tokenized-stocks
  image: ./robinhood.png
  description: >-
    Robinhood Chain (eip155:4663) tokenized stocks. map_scaled_transfers emits
    every ERC-8056 TransferWithScaledUI event (topic0 0x37e7f0db…), auto-capturing
    all Robinhood stock tokens with the scaled ui_value so supply/balances stay
    correct — naive ERC-20 Transfer indexing overstates supply ~56%. Stream against
    Pinax: -e robinhood.substreams.pinax.network:443

protobuf:
  files:
    - robinhood.proto
  importPaths:
    - ./proto

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/robinhood_substreams.wasm

network: robinhood-chain

modules:
  - name: map_scaled_transfers
    kind: map
    initialBlock: 0
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:robinhood.v1.ScaledTransfers
